# ============================================================
# ESA CCI 4km Ocean Colour Downloader - Configuration File
# ============================================================

# Copernicus Marine Service credentials
# Register at: https://marine.copernicus.eu/
credentials:
  username: "your_username"
  password: "your_password"

# Download period
dates:
  start: "2020-01"   # YYYY-MM-DD or YYYY-MM
  end:   "2020-05"

# Spatial bounding box (degrees)
bbox:
  lon_min: -180.0
  lon_max:  180.0
  lat_min:  -90.0
  lat_max:   90.0

# Output directory (relative or absolute path)
output_dir: "./data"

